[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "loopctl"
version = "0.1.0"
description = "Loop Engineering — founder CLI dashboard"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "lecore",
    "rich>=13.0",
    "typer>=0.12",
]

[project.scripts]
loopctl = "loopctl.__main__:app"

[tool.hatch.build.targets.wheel]
packages = ["loopctl"]
