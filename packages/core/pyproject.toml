[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lecore"
version = "0.1.0"
description = "Loop Engineering — harness-agnostic blackboard protocol library"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest", "pytest-cov"]

[tool.hatch.build.targets.wheel]
packages = ["lecore"]
