name: loop-engineering

services:
  # ── loopctl — founder CLI TUI dashboard ──────────────────────────────────────
  #
  # Runtime: Python 3.12-slim + lecore + loopctl (baked in at build time).
  # Source is volume-mounted so edits are live without rebuilding.
  #
  # Usage (from any directory):
  #   docker compose -f /path/to/docker-compose.yml \
  #     --project-directory /path/to/loop-engineering \
  #     run --rm -it -v /path/to/.claude/blackboard:/bb \
  #     cli loopctl --blackboard /bb
  #
  cli:
    build:
      context: .
      dockerfile: Dockerfile.cli
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    command: loopctl
    stdin_open: true
    tty: true

  # ── web — founder web dashboard (Next.js) ────────────────────────────────────
  #
  # Runtime: Node 22-slim. node_modules baked in at image build time —
  # startup is instant (no npm install at runtime).
  #
  # Source files are bind-mounted selectively so edits are live.
  # node_modules live only inside the image layer (never on the laptop).
  #
  # Set BLACKBOARD_HOST_PATH to point at an external blackboard repo:
  #   BLACKBOARD_HOST_PATH=/path/to/.claude/blackboard \
  #   docker compose --profile web up web
  #
  # Default: uses loop-engineering's own blackboard.
  #
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    working_dir: /app
    volumes:
      # Source files (hot-reload via WATCHPACK_POLLING)
      - ./packages/web/src:/app/src
      - ./packages/web/next.config.ts:/app/next.config.ts
      - ./packages/web/tsconfig.json:/app/tsconfig.json
      - ./packages/web/tailwind.config.ts:/app/tailwind.config.ts
      - ./packages/web/postcss.config.js:/app/postcss.config.js
      # Blackboard (read by API routes via BLACKBOARD_ROOT env)
      - ${BLACKBOARD_HOST_PATH:-./.claude/blackboard}:/bb
    environment:
      BLACKBOARD_ROOT: /bb
      NODE_ENV: development
    ports:
      - "4000:4000"
    profiles:
      - web
